{% extends "layout.html" %}

{% block title %}Welcome | PDF.PRO{% endblock %}

{% block extra_css %}
<style>
    .hero-section {
        padding-top: 100px;
        padding-bottom: 60px;
        text-align: center;
        background: radial-gradient(circle at center, rgba(13, 110, 253, 0.03) 0%, transparent 70%);
    }

    .hero-headline {
        font-family: 'Google Sans Flex', sans-serif;
        font-weight: 500;
        font-size: 5.5rem;
        letter-spacing: -3.5px;
        line-height: 1.05;
        color: #1a1a1a;
        margin-bottom: 50px;
        max-width: 1000px;
        margin-left: auto;
        margin-right: auto;
        animation: fadeInUp 1s ease-out;
    }

    @media (max-width: 768px) {
        .hero-headline {
            font-size: 3.5rem;
            letter-spacing: -2px;
        }
    }

    .hero-buttons {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
        animation: fadeInUp 1.2s ease-out;
    }

    .btn-portal-primary {
        background: #1a1a1a;
        color: white;
        padding: 14px 32px;
        border-radius: 50px;
        font-weight: 600;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        transition: all 0.3s ease;
        border: 1px solid #1a1a1a;
    }

    .btn-portal-primary:hover {
        background: #333;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        color: white;
    }

    .btn-portal-primary svg {
        margin-right: 10px;
        transition: transform 0.3s ease;
    }

    .btn-portal-primary:hover svg {
        transform: translateX(4px);
    }

    .btn-portal-glass {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 0, 0, 0.1);
        color: #1a1a1a;
        padding: 14px 32px;
        border-radius: 50px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s ease;
    }

    .btn-portal-glass:hover {
        background: rgba(255, 255, 255, 0.6);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        border-color: rgba(0,0,0,0.2);
        color: #1a1a1a;
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}

{% block content %}
<section class="hero-section">
    <h1 class="hero-headline">Easily convert images to PDF<br>and merge your documents</h1>
    
    <div class="hero-buttons">
        <a href="{{ url_for('image_to_pdf') }}" class="btn-portal-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M6 12.5a.5.5 0 0 0 .5.5h8a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5h-8a.5.5 0 0 0-.5.5v2a.5.5 0 0 1-1 0v-2A1.5 1.5 0 0 1 6.5 2h8A1.5 1.5 0 0 1 16 3.5v9a1.5 1.5 0 0 1-1.5 1.5h-8A1.5 1.5 0 0 1 5 12.5v-2a.5.5 0 0 1 1 0v2z"/>
                <path fill-rule="evenodd" d="M.146 8.354a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L1.707 7.5H10.5a.5.5 0 0 1 0 1H1.707l2.147 2.146a.5.5 0 1 1-.708.708l-3-3z"/>
            </svg>
            Image to PDF
        </a>
        <a href="{{ url_for('merge_pdf') }}" class="btn-portal-glass">Merge PDF</a>
        <a href="#" class="btn-portal-glass text-muted" style="cursor: not-allowed; opacity: 0.6;">Image to LaTeX</a>
    </div>
</section>
{% endblock %}

{% block extra_js %}
{% endblock %}
