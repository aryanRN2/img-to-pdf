<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PDF.PRO | Modern Document Tools{% endblock %}</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0d6efd;
            --primary-blue-dark: #0a58ca;
            --bg-white: #ffffff;
            --bg-light: #f8f9fa;
            --text-black: #1a1a1a;
            --glass-white: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            --premium-gradient: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-white);
            color: var(--text-black);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }

        .glass-navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-weight: 800;
            color: var(--text-black) !important;
            letter-spacing: -1px;
        }

        .glass-card {
            background: var(--premium-gradient);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            box-shadow: var(--glass-shadow);
            padding: 2.5rem;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: 0.5s;
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.08);
            border-color: var(--primary-blue);
        }

        .btn-premium {
            background-color: var(--text-black);
            color: white;
            border-radius: 50px;
            padding: 0.8rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            text-decoration: none;
            display: inline-block;
        }

        .btn-premium:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background-color: #333;
            color: white;
        }

        .form-control-premium {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
        }

        .badge-coming-soon {
            background: rgba(108, 117, 125, 0.1);
            color: #6c757d;
            border: 1px solid rgba(108, 117, 125, 0.2);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .icon-blob {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }

        .glass-card:hover .icon-blob {
            transform: scale(1.1) rotate(5deg);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <nav class="glass-navbar">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('home') }}">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-lightning-charge-fill me-2 text-primary" viewBox="0 0 16 16">
                    <path d="M11.251.068a.5.5 0 0 1 .227.58L9.677 6.5H13a.5.5 0 0 1 .364.843l-8 8.5a.5.5 0 0 1-.842-.49L6.323 9.5H3a.5.5 0 0 1-.364-.843l8-8.5a.5.5 0 0 1 .615-.09z"/>
                </svg>
                PDF.PRO
            </a>
        </div>
    </nav>

    <main class="container py-5">
        {% block content %}{% endblock %}
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];

            setTimeout(() => { canvas.style.opacity = '1'; }, 100);

            const particleSpacing = 60;
            const colors = ['#4285F4', '#EA4335', '#FBBC05', '#34A853', '#8E24AA'];
            let mouse = { x: undefined, y: undefined };
            let isMouseOverClickable = false;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initParticles();
            }

            class Particle {
                constructor(x, y) {
                    this.homeX = x; this.homeY = y;
                    this.x = x; this.y = y;
                    this.vx = 0; this.vy = 0;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.driftSpeed = 0.0002 + Math.random() * 0.0005;
                    this.driftRadius = 30 + Math.random() * 50;
                    this.randomOffset = Math.random() * Math.PI * 2;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = 0.4;
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
                update() {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 200) {
                        const forceDirectionX = dx / distance;
                        const forceDirectionY = dy / distance;
                        const force = (200 - distance) / 200;
                        if (isMouseOverClickable) {
                            this.vx += forceDirectionX * force * 12;
                            this.vy += forceDirectionY * force * 12;
                        } else {
                            this.vx -= forceDirectionX * force * 8;
                            this.vy -= forceDirectionY * force * 8;
                        }
                    }
                    const time = Date.now();
                    const targetX = this.homeX + Math.cos(time * this.driftSpeed + this.randomOffset) * this.driftRadius;
                    const targetY = this.homeY + Math.sin(time * this.driftSpeed + this.randomOffset) * this.driftRadius;
                    this.vx += (targetX - this.x) * 0.05;
                    this.vy += (targetY - this.y) * 0.05;
                    this.vx *= 0.8; this.vy *= 0.8;
                    this.x += this.vx; this.y += this.vy;
                    this.draw();
                }
            }

            function initParticles() {
                particles = [];
                for (let y = 0; y < height + 60; y += 60) {
                    for (let x = 0; x < width + 60; x += 60) {
                        particles.push(new Particle(x, y));
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => p.update());
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', resize);
            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX; mouse.y = e.clientY;
                isMouseOverClickable = !!e.target.closest('a, button, input');
            });

            resize();
            animate();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
