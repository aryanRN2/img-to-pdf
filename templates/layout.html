<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PDF.PRO | Modern Document Tools{% endblock %}</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Google Fonts: Google Sans Flex -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,slnt,wdth,wght,ROND@8..144,-10..0,25..150,400..900,0..100&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1a1a1a;
            --primary-blue-dark: #000000;
            --bg-white: #ffffff;
            --bg-light: #f8f9fa;
            --text-black: #1a1a1a;
            --glass-white: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
            --premium-gradient: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
            --font-main: 'Google Sans Flex', 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background-color: transparent;
            color: var(--text-black);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }

        .glass-navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 0;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
        }

        .navbar-brand {
            font-weight: 800;
            color: var(--text-black) !important;
            letter-spacing: -1px;
            font-size: 1.4rem;
        }

        .transparent-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            margin: 0 auto;
            animation: floatCard 6s ease-in-out infinite;
            width: 100%;
            max-width: 100%;
        }

        /* Subtler animation for forms to prevent jumping on mobile */
        @media (max-width: 768px) {
            .transparent-card {
                padding: 2rem 1.5rem;
                animation: none; /* Disable float on mobile for better usability */
            }
        }

        .btn-blue {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 2.5rem;
            background: #1a1a1a;
            color: white !important;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid #1a1a1a;
            text-align: center;
            cursor: pointer;
            width: 100%;
        }

        .btn-blue:hover {
            background: #333;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            border-color: #333;
        }

        .form-control-premium {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        .form-control-premium:focus {
            background: #ffffff;
            border-color: #1a1a1a;
            box-shadow: 0 0 0 4px rgba(26, 26, 26, 0.1);
            transform: translateY(-1px);
        }

        .badge-coming-soon {
            background: rgba(108, 117, 125, 0.1);
            color: #6c757d;
            border: 1px solid rgba(108, 117, 125, 0.2);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .source-backdoor {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background-color: #f8f9fa;
            color: #5f6368;
            border-radius: 50%;
            border: 2px solid #dee2e6;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .source-backdoor:hover {
            background-color: #1a1a1a;
            color: #4285F4 !important;
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 20px rgba(66, 133, 244, 0.3);
            border-color: #1a1a1a;
        }

        .code-icon {
            font-weight: 800;
            font-size: 1.1rem;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
        }

        .source-backdoor:hover .code-icon {
            transform: rotate(360deg);
        }

        .nav-link.hover-blue:hover {
            color: var(--primary-blue) !important;
        }

        /* Floating Animation */
        @keyframes floatCard {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .floating-card {
            animation: floatCard 6s ease-in-out infinite;
        }

        /* Entrance Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
            opacity: 0;
        }

        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .stagger-5 { animation-delay: 0.5s; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <main class="container py-5 flex-grow-1 d-flex flex-column justify-content-center">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-4 mt-5 border-top">
        <div class="container">
            <p class="text-muted small mb-3">© 2026 Aryan Maurya. Released under <a href="#" class="text-decoration-none fw-bold" style="color: #1a1a1a;">MIT License</a>.</p>
            <a href="https://placement-project-delta.vercel.app/source" target="_blank" class="source-backdoor" title="Access Developer Mode">
                <span class="code-icon">&lt;/&gt;</span>
            </a>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
